<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tuliplan 🌷</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ── TEMAS ── */
[data-theme="rosa"]{
  --deep:#ad0087;--main:#ff66c4;--light:#ffbee6;--pale:#fff0fa;--ultra:#ffe0f5;
  --sidebar-from:#ad0087;--sidebar-to:#7a0060;
  --text:#3a003a;--text2:#7a3a6a;--text3:#c47ab0;
  --bg:#fff0fa;--card:#fff;--border:rgba(173,0,135,.14);--border2:rgba(173,0,135,.28);
  --metric:#ffe0f5;--shadow:0 4px 24px rgba(173,0,135,.10);--shadow-sm:0 2px 8px rgba(173,0,135,.08);
  --green:#2d6e20;--green-bg:#eaf3de;--red:#a32d2d;--red-bg:#fcebeb;--amber:#7a4a0a;--amber-bg:#faeeda;
  --badge-main:var(--ultra);--badge-main-text:var(--deep);
}
[data-theme="roxo"]{
  --deep:#5b21b6;--main:#8b5cf6;--light:#c4b5fd;--pale:#f5f3ff;--ultra:#ede9fe;
  --sidebar-from:#5b21b6;--sidebar-to:#3b0764;
  --text:#1e1b2e;--text2:#5b4f8a;--text3:#a08cc8;
  --bg:#f5f3ff;--card:#fff;--border:rgba(91,33,182,.13);--border2:rgba(91,33,182,.28);
  --metric:#ede9fe;--shadow:0 4px 24px rgba(91,33,182,.10);--shadow-sm:0 2px 8px rgba(91,33,182,.08);
  --green:#2d6e20;--green-bg:#eaf3de;--red:#a32d2d;--red-bg:#fcebeb;--amber:#7a4a0a;--amber-bg:#faeeda;
  --badge-main:var(--ultra);--badge-main-text:var(--deep);
}
[data-theme="azul"]{
  --deep:#1d4ed8;--main:#3b82f6;--light:#93c5fd;--pale:#eff6ff;--ultra:#dbeafe;
  --sidebar-from:#1d4ed8;--sidebar-to:#1e3a8a;
  --text:#0f1f40;--text2:#2a4a8a;--text3:#6b90c8;
  --bg:#eff6ff;--card:#fff;--border:rgba(29,78,216,.13);--border2:rgba(29,78,216,.28);
  --metric:#dbeafe;--shadow:0 4px 24px rgba(29,78,216,.10);--shadow-sm:0 2px 8px rgba(29,78,216,.08);
  --green:#2d6e20;--green-bg:#eaf3de;--red:#a32d2d;--red-bg:#fcebeb;--amber:#7a4a0a;--amber-bg:#faeeda;
  --badge-main:var(--ultra);--badge-main-text:var(--deep);
}
[data-theme="neutro"]{
  --deep:#44403c;--main:#78716c;--light:#d6d3d1;--pale:#fafaf9;--ultra:#f5f5f4;
  --sidebar-from:#44403c;--sidebar-to:#1c1917;
  --text:#1c1917;--text2:#57534e;--text3:#a8a29e;
  --bg:#fafaf9;--card:#fff;--border:rgba(0,0,0,.10);--border2:rgba(0,0,0,.2);
  --metric:#f5f5f4;--shadow:0 4px 24px rgba(0,0,0,.08);--shadow-sm:0 2px 8px rgba(0,0,0,.06);
  --green:#2d6e20;--green-bg:#eaf3de;--red:#a32d2d;--red-bg:#fcebeb;--amber:#7a4a0a;--amber-bg:#faeeda;
  --badge-main:var(--ultra);--badge-main-text:var(--deep);
}
[data-theme="escuro"]{
  --deep:#f4f4f5;--main:#a1a1aa;--light:#3f3f46;--pale:#18181b;--ultra:#27272a;
  --sidebar-from:#09090b;--sidebar-to:#18181b;
  --text:#f4f4f5;--text2:#a1a1aa;--text3:#71717a;
  --bg:#18181b;--card:#27272a;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.16);
  --metric:#3f3f46;--shadow:0 4px 24px rgba(0,0,0,.4);--shadow-sm:0 2px 8px rgba(0,0,0,.3);
  --green:#4ade80;--green-bg:rgba(74,222,128,.12);--red:#f87171;--red-bg:rgba(248,113,113,.12);--amber:#fbbf24;--amber-bg:rgba(251,191,36,.12);
  --badge-main:rgba(255,255,255,.08);--badge-main-text:var(--text2);
}

body{
  font-family:'Montserrat',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  transition:background .25s,color .25s;
}

/* ── SIDEBAR ── */
.sidebar{
  position:fixed;left:0;top:0;bottom:0;width:230px;
  background:linear-gradient(180deg,var(--sidebar-from) 0%,var(--sidebar-to) 100%);
  z-index:100;display:flex;flex-direction:column;
  box-shadow:4px 0 24px rgba(0,0,0,.18);
  transition:transform .3s ease;
}
.sidebar-logo{
  padding:28px 24px 22px;
  border-bottom:1px solid rgba(255,255,255,.12);
}
.sidebar-logo .app-name{
  font-family:'Dancing Script',cursive;
  font-size:2rem;color:#fff;line-height:1;
}
.sidebar-logo .app-sub{
  font-size:.65rem;color:rgba(255,255,255,.55);
  letter-spacing:.15em;text-transform:uppercase;margin-top:3px;
}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:12px 24px;color:rgba(255,255,255,.72);
  font-size:.85rem;font-weight:500;cursor:pointer;
  transition:all .18s;border-left:3px solid transparent;
  background:none;border-right:none;border-top:none;border-bottom:none;
  width:100%;text-align:left;font-family:'Montserrat',sans-serif;
}
.nav-item:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-item.active{
  background:rgba(255,255,255,.15);color:#fff;
  border-left-color:var(--light);font-weight:700;
}
.nav-item i{font-size:1.05rem;width:20px;text-align:center}
.sidebar-footer{
  padding:16px 24px 20px;
  border-top:1px solid rgba(255,255,255,.12);
}
.theme-label{
  font-size:.6rem;color:rgba(255,255,255,.45);
  text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;
}
.theme-dots{display:flex;gap:7px;flex-wrap:wrap}
.theme-dot{
  width:22px;height:22px;border-radius:50%;cursor:pointer;
  border:2.5px solid transparent;transition:border .15s;flex-shrink:0;
  position:relative;
}
.theme-dot.active{border-color:#fff}
.theme-dot[data-t="escuro"]{
  background:linear-gradient(135deg,#111 50%,#fff 50%);
}

/* ── MOBILE HEADER ── */
.mobile-header{
  display:none;position:sticky;top:0;z-index:90;
  background:var(--card);padding:13px 18px;
  align-items:center;justify-content:space-between;
  box-shadow:var(--shadow-sm);
  border-bottom:1px solid var(--border);
}
.hamburger{
  width:34px;height:34px;background:var(--pale);border:none;border-radius:8px;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
}
.hamburger span{display:block;width:17px;height:2px;background:var(--deep);border-radius:2px}
.mobile-app-name{
  font-family:'Dancing Script',cursive;
  font-size:1.5rem;color:var(--deep);
}
.sidebar-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.4);z-index:99;
}
.sidebar-overlay.open{display:block}

/* ── MAIN CONTENT ── */
.main-content{
  margin-left:230px;min-height:100vh;
  background:var(--bg);transition:margin-left .3s ease;
}
.screen{display:none;padding:28px 28px 48px}
.screen.active{display:block}

/* ── CARDS ── */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:18px;padding:20px 22px;margin-bottom:16px;
  box-shadow:var(--shadow-sm);
}
.card-title{
  font-size:.8rem;font-weight:700;color:var(--text2);
  margin-bottom:14px;display:flex;align-items:center;gap:6px;
  text-transform:uppercase;letter-spacing:.06em;
}
.card-title i{font-size:.95rem}

/* ── GREETING CARD ── */
.greeting-card{
  background:linear-gradient(135deg,var(--sidebar-from) 0%,var(--main) 100%);
  border-radius:18px;padding:28px 30px;color:#fff;
  position:relative;overflow:hidden;margin-bottom:20px;
  box-shadow:var(--shadow);
}
.greeting-card::after{
  content:'🌷';position:absolute;right:22px;top:50%;
  transform:translateY(-50%);font-size:5rem;opacity:.15;pointer-events:none;
}
.greeting-card .day-info{
  font-size:.7rem;text-transform:uppercase;letter-spacing:.14em;opacity:.8;margin-bottom:4px;
}
.greeting-card h1{
  font-family:'Dancing Script',cursive;
  font-size:2rem;font-weight:700;margin-bottom:4px;
}
.greeting-card .sub-msg{font-size:.85rem;opacity:.82;font-weight:300}

/* ── METRICS GRID ── */
.metrics-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:12px;margin-bottom:16px;
}
.metric{
  background:var(--metric);border-radius:14px;padding:16px 18px;
}
.metric-label{font-size:.68rem;font-weight:600;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.metric-value{font-size:1.35rem;font-weight:700;line-height:1}
.metric-value.green{color:var(--green)}
.metric-value.red{color:var(--red)}
.metric-value.accent{color:var(--deep)}
.metric-value.amber{color:var(--amber)}

/* ── SECTION TITLE ── */
.section-title{
  font-family:'Dancing Script',cursive;
  font-size:1.6rem;color:var(--deep);
  margin-bottom:18px;display:flex;align-items:center;
  justify-content:space-between;gap:10px;
}
.section-title-line{
  flex:1;height:1px;background:var(--border);margin-left:8px;
}

/* ── TABS ── */
.tab-row{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;flex-wrap:wrap}
.tab-row::-webkit-scrollbar{display:none}
.tab{
  padding:6px 16px;border-radius:20px;
  border:1.5px solid var(--border2);background:transparent;
  cursor:pointer;font-size:.78rem;font-weight:600;color:var(--text2);
  font-family:'Montserrat',sans-serif;white-space:nowrap;transition:all .15s;
}
.tab.active{
  background:linear-gradient(135deg,var(--sidebar-from),var(--main));
  color:#fff;border-color:transparent;
}
.tab:hover:not(.active){background:var(--pale);border-color:var(--main)}

/* ── BUTTONS ── */
.btn{
  padding:8px 16px;border-radius:10px;
  border:1.5px solid var(--border2);background:transparent;
  cursor:pointer;font-size:.8rem;font-family:'Montserrat',sans-serif;
  display:inline-flex;align-items:center;gap:5px;
  transition:all .15s;color:var(--text);font-weight:500;
}
.btn:hover{background:var(--pale);border-color:var(--main);color:var(--deep)}
.btn-primary{
  background:linear-gradient(135deg,var(--main),var(--deep));
  color:#fff;border-color:transparent;
}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);color:#fff}
.btn-sm{padding:5px 12px;font-size:.75rem}
.btn-danger{color:var(--red);border-color:var(--red-bg)}
.btn-danger:hover{background:var(--red-bg);border-color:var(--red)}

/* ── FORMS ── */
.form-group{margin-bottom:14px}
.form-group label{
  display:block;font-size:.72rem;font-weight:700;
  color:var(--text2);margin-bottom:5px;
  letter-spacing:.05em;text-transform:uppercase;
}
input,select,textarea{
  width:100%;padding:10px 14px;
  border:1.5px solid var(--border2);border-radius:10px;
  background:var(--card);color:var(--text);
  font-size:.88rem;font-family:'Montserrat',sans-serif;
  transition:border-color .2s;outline:none;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--main);
  box-shadow:0 0 0 3px rgba(var(--main-rgb,.2));
}

/* ── BADGES ── */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:700}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-main{background:var(--badge-main);color:var(--badge-main-text)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{
  text-align:left;padding:8px 12px;
  border-bottom:1.5px solid var(--border);
  font-size:.68rem;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.07em;
}
td{padding:9px 12px;border-bottom:1px solid var(--border)}
tr:last-child td{border:none}
tr:hover td{background:var(--pale)}

/* ── PROFIT BAR ── */
.profit-bar-wrap{
  background:var(--metric);border-radius:6px;height:7px;overflow:hidden;margin-top:4px;
}
.profit-bar{
  height:100%;border-radius:6px;
  background:linear-gradient(90deg,var(--main),var(--deep));
}

/* ── TAGS ── */
.tag-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.proc-tag{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--ultra);border:1.5px solid var(--light);
  border-radius:20px;padding:5px 13px;font-size:.75rem;color:var(--deep);font-weight:500;
}
.prod-tag{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--metric);border-radius:20px;
  padding:5px 13px;font-size:.75rem;color:var(--text2);
}
.x-btn{background:none;border:none;cursor:pointer;color:var(--red);font-size:.8rem;padding:0;line-height:1}

/* ── MODAL ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0;
}
@media(min-width:520px){.modal-bg{align-items:center;padding:1rem}}
.modal{
  background:var(--card);border-radius:22px 22px 0 0;
  padding:24px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;
  position:relative;
}
.modal::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--main),var(--deep));
  border-radius:22px 22px 0 0;
}
@media(min-width:520px){.modal{border-radius:22px}.modal::before{border-radius:22px 22px 0 0}}
.modal-title{
  font-family:'Dancing Script',cursive;
  font-size:1.5rem;color:var(--deep);
  margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;
}
.close-btn{
  background:var(--pale);border:none;cursor:pointer;
  color:var(--text2);font-size:1rem;padding:6px 9px;
  border-radius:8px;transition:background .15s;font-family:'Montserrat',sans-serif;
}
.close-btn:hover{background:var(--light)}

/* ── ALERT ── */
.alert{
  padding:11px 16px;border-radius:12px;font-size:.82rem;
  margin-bottom:14px;font-weight:500;border-left:4px solid;
}
.alert-success{background:var(--green-bg);color:var(--green);border-left-color:var(--green)}
.alert-error{background:var(--red-bg);color:var(--red);border-left-color:var(--red)}

/* ── EMPTY STATE ── */
.empty{
  text-align:center;padding:40px 20px;color:var(--text3);
}
.empty .empty-icon{font-size:2.4rem;margin-bottom:10px}
.empty p{font-size:.85rem}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:14px 0}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .mobile-header{display:flex}
  .main-content{margin-left:0}
  .screen{padding:18px 16px 48px}
  .metrics-grid{grid-template-columns:repeat(2,1fr)}
  .greeting-card::after{font-size:3.5rem;right:14px}
}
</style>
</head>
<body data-theme="rosa">

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="app-name">Tuliplan</div>
    <div class="app-sub">Gestão de nail studio</div>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <div class="theme-label">Tema de cores</div>
    <div class="theme-dots" id="theme-dots"></div>
  </div>
</aside>
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- Mobile header -->
<header class="mobile-header">
  <button class="hamburger" onclick="openSidebar()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <span class="mobile-app-name">Tuliplan</span>
  <span style="width:34px"></span>
</header>

<!-- Main -->
<div class="main-content">
  <div id="alert-area"></div>

  <div class="screen active" id="screen-dashboard"></div>
  <div class="screen" id="screen-atendimento"></div>
  <div class="screen" id="screen-caixa"></div>
  <div class="screen" id="screen-materiais"></div>
  <div class="screen" id="screen-relatorios"></div>
  <div class="screen" id="screen-config"></div>
</div>

<!-- Modal container -->
<div id="modal-area"></div>

<script>
const SK='tuliplan_v1';
function load(){try{return JSON.parse(localStorage.getItem(SK)||'{}')}catch{return{}}}
function save(d){localStorage.setItem(SK,JSON.stringify(d))}

const THEMES=[
  {id:'rosa',   label:'Rosa',   dot:'linear-gradient(135deg,#ad0087,#ff66c4)'},
  {id:'roxo',   label:'Roxo',   dot:'linear-gradient(135deg,#5b21b6,#8b5cf6)'},
  {id:'azul',   label:'Azul',   dot:'linear-gradient(135deg,#1d4ed8,#3b82f6)'},
  {id:'neutro', label:'Neutro', dot:'linear-gradient(135deg,#44403c,#78716c)'},
  {id:'escuro', label:'Dark',   dot:'linear-gradient(135deg,#111 50%,#f4f4f5 50%)'},
];

const PAGES=[
  {id:'dashboard',icon:'ti-home',label:'Início'},
  {id:'atendimento',icon:'ti-scissors',label:'Atendimentos'},
  {id:'caixa',icon:'ti-cash',label:'Caixa'},
  {id:'materiais',icon:'ti-package',label:'Materiais'},
  {id:'relatorios',icon:'ti-chart-bar',label:'Relatórios'},
  {id:'config',icon:'ti-settings',label:'Config'},
];

let saved=load();
let state={
  data:Object.assign({
    procedimentos:[
      {id:'p1',nome:'Alongamento de Unha',preco:120},
      {id:'p2',nome:'Manutenção de Alongamento',preco:80},
      {id:'p3',nome:'Esmaltação em Gel',preco:60},
      {id:'p4',nome:'Esmaltação Normal',preco:35},
      {id:'p5',nome:'Buço',preco:20},
      {id:'p6',nome:'Sobrancelha',preco:25}
    ],
    produtos:[
      {id:'m1',nome:'Gel UV'},{id:'m2',nome:'Esmalte Gel'},
      {id:'m3',nome:'Base Rubber'},{id:'m4',nome:'Top Coat'},
      {id:'m5',nome:'Cera Depilatória'}
    ],
    atendimentos:[],
    gastos_materiais:[],
    caixa_fechamentos:[],
    tema:'rosa'
  },saved),
  page:'dashboard',
  modal:null,
  tabs:{dashboard:'hoje'}
};

function saveState(){save(state.data)}
function uid(){return 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)}
function fmt(n){return 'R$ '+Number(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtD(s){if(!s)return '';return new Date(s+'T12:00:00').toLocaleDateString('pt-BR')}
function today(){return new Date().toISOString().slice(0,10)}
function thisMonth(){return today().slice(0,7)}
function thisWeek(){const d=new Date(),dy=d.getDay(),diff=d.getDate()-dy+(dy===0?-6:1);return new Date(new Date().setDate(diff)).toISOString().slice(0,10)}
function getDayName(){return new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}

function filterD(arr,field,p){
  const t=today(),m=thisMonth(),w=thisWeek();
  return arr.filter(x=>{
    if(!x[field])return false;
    if(p==='hoje')return x[field]===t;
    if(p==='semana')return x[field]>=w&&x[field]<=t;
    if(p==='mes')return x[field].startsWith(m);
    return true;
  });
}

function showAlert(msg,type='success'){
  const a=document.getElementById('alert-area');
  if(!a)return;
  a.innerHTML=`<div class="alert alert-${type}" style="margin:14px 28px 0">${msg}</div>`;
  setTimeout(()=>{a.innerHTML=''},2500);
}

function applyTheme(t){
  document.body.setAttribute('data-theme',t);
  state.data.tema=t;saveState();
  renderThemeDots();
}

function nav(p){
  state.page=p;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.page===p));
  document.querySelectorAll('.screen').forEach(el=>el.classList.remove('active'));
  const s=document.getElementById('screen-'+p);
  if(s){s.classList.add('active');renderScreen(p)}
  closeSidebar();
}

function openSidebar(){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function renderSidebar(){
  const nav=document.getElementById('sidebar-nav');
  nav.innerHTML=PAGES.map(p=>`<button class="nav-item${state.page===p.id?' active':''}" data-page="${p.id}" onclick="window.nav('${p.id}')"><i class="ti ${p.icon}"></i>${p.label}</button>`).join('');
}

function renderThemeDots(){
  const d=document.getElementById('theme-dots');
  if(!d)return;
  const tema=state.data.tema||'rosa';
  d.innerHTML=THEMES.map(th=>`<div class="theme-dot${tema===th.id?' active':''}" data-t="${th.id}" style="background:${th.dot}" title="${th.label}" onclick="applyTheme('${th.id}')"></div>`).join('');
}

function renderScreen(p){
  const el=document.getElementById('screen-'+p);
  if(!el)return;
  if(p==='dashboard')el.innerHTML=renderDashboard();
  else if(p==='atendimento')el.innerHTML=renderAtendimento();
  else if(p==='caixa')el.innerHTML=renderCaixa();
  else if(p==='materiais')el.innerHTML=renderMateriais();
  else if(p==='relatorios')el.innerHTML=renderRelatorios();
  else if(p==='config')el.innerHTML=renderConfig();
  attachFormEvents();
}

/* ── RENDERS ── */
function renderDashboard(){
  const tab=state.tabs.dashboard||'hoje';
  const ats=filterD(state.data.atendimentos,'data',tab);
  const gas=filterD(state.data.gastos_materiais,'data',tab);
  const ent=ats.reduce((s,a)=>s+(parseFloat(a.valor_cobrado)||0),0);
  const sai=gas.reduce((s,g)=>s+(parseFloat(g.valor)||0),0);
  const luc=ent-sai;
  const n=ats.length;
  const tick=n?ent/n:0;
  const procs={};
  ats.forEach(a=>{
    const p=state.data.procedimentos.find(x=>x.id===a.procedimento_id);
    const nome=p?p.nome:'Outro';
    if(!procs[nome]){procs[nome]={count:0,valor:0}}
    procs[nome].count++;procs[nome].valor+=parseFloat(a.valor_cobrado)||0;
  });
  const pl=Object.entries(procs).sort((a,b)=>b[1].valor-a[1].valor);
  const recentes=state.data.atendimentos.slice(-5).reverse();

  return `
  <div class="greeting-card">
    <div class="day-info">${getDayName()}</div>
    <h1>Olá, bem-vinda! 🌷</h1>
    <div class="sub-msg">Aqui está o resumo do seu estúdio</div>
  </div>
  <div class="tab-row">
    ${['hoje','semana','mes'].map(t=>`<button class="tab${tab===t?' active':''}" onclick="setTab('dashboard','${t}')">${t==='hoje'?'Hoje':t==='semana'?'Esta semana':'Este mês'}</button>`).join('')}
  </div>
  <div class="metrics-grid">
    <div class="metric"><div class="metric-label">Entradas</div><div class="metric-value green">${fmt(ent)}</div></div>
    <div class="metric"><div class="metric-label">Saídas</div><div class="metric-value red">${fmt(sai)}</div></div>
    <div class="metric"><div class="metric-label">Lucro</div><div class="metric-value ${luc>=0?'green':'red'}">${fmt(luc)}</div></div>
    <div class="metric"><div class="metric-label">Clientes</div><div class="metric-value accent">${n}</div></div>
    <div class="metric"><div class="metric-label">Ticket médio</div><div class="metric-value amber">${fmt(tick)}</div></div>
  </div>
  <div class="card">
    <div class="card-title"><i class="ti ti-chart-bar"></i> Por procedimento</div>
    ${pl.length===0?`<div class="empty"><div class="empty-icon">💅</div><p>Nenhum atendimento no período</p></div>`:''}
    ${pl.map(([nome,d])=>`<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
        <span style="font-size:.85rem">${nome}</span>
        <span style="font-size:.85rem;font-weight:700">${fmt(d.valor)} <span style="color:var(--text3);font-weight:400;font-size:.75rem">${d.count}x</span></span>
      </div>
      <div class="profit-bar-wrap"><div class="profit-bar" style="width:${Math.min(100,(d.valor/(ent||1))*100).toFixed(0)}%"></div></div>
    </div>`).join('')}
  </div>
  <div class="card">
    <div class="card-title"><i class="ti ti-clock-hour-4"></i> Últimos atendimentos</div>
    ${recentes.length===0?`<div class="empty"><div class="empty-icon">🗂️</div><p>Nenhum atendimento ainda</p></div>`:''}
    ${recentes.map(a=>{
      const p=state.data.procedimentos.find(x=>x.id===a.procedimento_id);
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-size:.88rem;font-weight:600">${a.cliente||'Cliente'}</div>
          <div style="font-size:.72rem;color:var(--text3);margin-top:1px">${p?p.nome:''} · ${fmtD(a.data)}</div>
        </div>
        <span class="badge badge-green">${fmt(a.valor_cobrado)}</span>
      </div>`;
    }).join('')}
  </div>`;
}

function renderAtendimento(){
  const ats=state.data.atendimentos.slice(-60).reverse();
  return `
  <div class="section-title">Atendimentos <span class="section-title-line"></span>
    <button class="btn btn-primary btn-sm" onclick="openModal('novo_atendimento')"><i class="ti ti-plus"></i> Novo</button>
  </div>
  <div class="card">
    <div class="card-title"><i class="ti ti-list"></i> Histórico</div>
    ${ats.length===0?`<div class="empty"><div class="empty-icon">✂️</div><p>Nenhum atendimento ainda.<br>Clique em Novo para começar.</p></div>`:''}
    <div style="overflow-x:auto">
    <table>
      <thead><tr><th>Data</th><th>Cliente</th><th>Procedimento</th><th>Valor</th><th>Pag.</th><th></th></tr></thead>
      <tbody>
        ${ats.map(a=>{
          const p=state.data.procedimentos.find(x=>x.id===a.procedimento_id);
          return `<tr>
            <td style="white-space:nowrap">${fmtD(a.data)}</td>
            <td>${a.cliente||'-'}</td>
            <td>${p?p.nome:'-'}</td>
            <td><span class="badge badge-green">${fmt(a.valor_cobrado)}</span></td>
            <td><span class="badge badge-main">${a.pagamento||'-'}</span></td>
            <td><button class="btn btn-sm btn-danger" onclick="delAt('${a.id}')"><i class="ti ti-trash"></i></button></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>
  </div>`;
}

function renderCaixa(){
  const h=today();
  const ah=state.data.atendimentos.filter(a=>a.data===h);
  const gh=state.data.gastos_materiais.filter(g=>g.data===h);
  const ent=ah.reduce((s,a)=>s+(parseFloat(a.valor_cobrado)||0),0);
  const sai=gh.reduce((s,g)=>s+(parseFloat(g.valor)||0),0);
  const saldo=ent-sai;
  const pix=ah.filter(a=>a.pagamento==='Pix').reduce((s,a)=>s+(parseFloat(a.valor_cobrado)||0),0);
  const din=ah.filter(a=>a.pagamento==='Dinheiro').reduce((s,a)=>s+(parseFloat(a.valor_cobrado)||0),0);
  const car=ah.filter(a=>a.pagamento==='Cartão'||a.pagamento==='Crédito').reduce((s,a)=>s+(parseFloat(a.valor_cobrado)||0),0);
  const fech=state.data.caixa_fechamentos.slice(-12).reverse();
  return `
  <div class="section-title">Fechamento de caixa <span class="section-title-line"></span></div>
  <div class="card">
    <div class="card-title"><i class="ti ti-calendar-today"></i> Hoje — ${fmtD(h)}</div>
    <div class="metrics-grid">
      <div class="metric"><div class="metric-label">Entradas</div><div class="metric-value green">${fmt(ent)}</div></div>
      <div class="metric"><div class="metric-label">Saídas</div><div class="metric-value red">${fmt(sai)}</div></div>
      <div class="metric"><div class="metric-label">Saldo</div><div class="metric-value ${saldo>=0?'green':'red'}">${fmt(saldo)}</div></div>
      <div class="metric"><div class="metric-label">Atendimentos</div><div class="metric-value accent">${ah.length}</div></div>
    </div>
    <div class="divider"></div>
    <div class="card-title" style="margin-bottom:10px"><i class="ti ti-credit-card"></i> Por forma de pagamento</div>
    <div class="metrics-grid">
      <div class="metric"><div class="metric-label">Dinheiro</div><div class="metric-value">${fmt(din)}</div></div>
      <div class="metric"><div class="metric-label">Pix</div><div class="metric-value">${fmt(pix)}</div></div>
      <div class="metric"><div class="metric-label">Cartão</div><div class="metric-value">${fmt(car)}</div></div>
    </div>
    <div class="divider"></div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <input type="text" id="obs_caixa" placeholder="Observação (opcional)" style="flex:1;min-width:160px">
      <button class="btn btn-primary" onclick="fecharCaixa()"><i class="ti ti-lock"></i> Fechar caixa</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title"><i class="ti ti-history"></i> Histórico de fechamentos</div>
    ${fech.length===0?`<div class="empty"><p>Nenhum fechamento ainda</p></div>`:''}
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Data</th><th>Entradas</th><th>Saídas</th><th>Saldo</th><th>Obs.</th></tr></thead>
      <tbody>${fech.map(f=>`<tr>
        <td>${fmtD(f.data)}</td>
        <td style="color:var(--green)">${fmt(f.entradas)}</td>
        <td style="color:var(--red)">${fmt(f.saidas)}</td>
        <td style="font-weight:700;color:${f.saldo>=0?'var(--green)':'var(--red)'}">${fmt(f.saldo)}</td>
        <td style="color:var(--text3);font-size:.75rem">${f.obs||'-'}</td>
      </tr>`).join('')}</tbody>
    </table></div>
  </div>`;
}

function renderMateriais(){
  const gas=state.data.gastos_materiais.slice(-60).reverse();
  const m=thisMonth();
  const gm=state.data.gastos_materiais.filter(g=>g.data&&g.data.startsWith(m));
  const total=gm.reduce((s,g)=>s+(parseFloat(g.valor)||0),0);
  return `
  <div class="section-title">Materiais <span class="section-title-line"></span>
    <button class="btn btn-primary btn-sm" onclick="openModal('novo_gasto')"><i class="ti ti-plus"></i> Novo gasto</button>
  </div>
  <div class="metrics-grid" style="margin-bottom:14px">
    <div class="metric"><div class="metric-label">Gasto este mês</div><div class="metric-value red">${fmt(total)}</div></div>
    <div class="metric"><div class="metric-label">Registros este mês</div><div class="metric-value accent">${gm.length}</div></div>
  </div>
  <div class="card">
    <div class="card-title"><i class="ti ti-package"></i> Histórico</div>
    ${gas.length===0?`<div class="empty"><div class="empty-icon">📦</div><p>Nenhum gasto ainda</p></div>`:''}
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Data</th><th>Produto</th><th>Descrição</th><th>Valor</th><th></th></tr></thead>
      <tbody>${gas.map(g=>{
        const p=state.data.produtos.find(x=>x.id===g.produto_id);
        return `<tr>
          <td style="white-space:nowrap">${fmtD(g.data)}</td>
          <td>${p?p.nome:(g.produto_livre||'-')}</td>
          <td style="color:var(--text3);font-size:.75rem">${g.descricao||'-'}</td>
          <td><span class="badge badge-red">${fmt(g.valor)}</span></td>
          <td><button class="btn btn-sm btn-danger" onclick="delGasto('${g.id}')"><i class="ti ti-trash"></i></button></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>`;
}

function renderRelatorios(){
  const m=thisMonth();
  const mes=new Date(m+'-01').toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const atsM=state.data.atendimentos.filter(a=>a.data&&a.data.startsWith(m));
  const gasM=state.data.gastos_materiais.filter(g=>g.data&&g.data.startsWith(m));
  const rec=atsM.reduce((s,a)=>s+(parseFloat(a.valor_cobrado)||0),0);
  const des=gasM.reduce((s,g)=>s+(parseFloat(g.valor)||0),0);
  const luc=rec-des;
  const byP={};
  state.data.procedimentos.forEach(p=>{byP[p.id]={nome:p.nome,count:0,receita:0}});
  atsM.forEach(a=>{
    const k=a.procedimento_id;
    if(!byP[k])byP[k]={nome:'Outro',count:0,receita:0};
    byP[k].count++;byP[k].receita+=parseFloat(a.valor_cobrado)||0;
  });
  const pa=Object.values(byP).filter(p=>p.count>0).sort((a,b)=>b.receita-a.receita);
  const pgtos={};
  atsM.forEach(a=>{const k=a.pagamento||'Outro';if(!pgtos[k])pgtos[k]=0;pgtos[k]+=parseFloat(a.valor_cobrado)||0;});
  return `
  <div class="section-title">Relatório <span class="section-title-line"></span></div>
  <div class="card">
    <div class="card-title"><i class="ti ti-calendar-month"></i> ${mes}</div>
    <div class="metrics-grid">
      <div class="metric"><div class="metric-label">Receita</div><div class="metric-value green">${fmt(rec)}</div></div>
      <div class="metric"><div class="metric-label">Despesas</div><div class="metric-value red">${fmt(des)}</div></div>
      <div class="metric"><div class="metric-label">Lucro</div><div class="metric-value ${luc>=0?'green':'red'}">${fmt(luc)}</div></div>
      <div class="metric"><div class="metric-label">Atendimentos</div><div class="metric-value accent">${atsM.length}</div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title"><i class="ti ti-chart-bar"></i> Por procedimento</div>
    ${pa.length===0?`<div class="empty"><p>Nenhum atendimento este mês</p></div>`:''}
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Procedimento</th><th>Qtd.</th><th>Receita</th><th>% do total</th></tr></thead>
      <tbody>${pa.map(p=>`<tr>
        <td>${p.nome}</td><td>${p.count}</td>
        <td style="font-weight:700;color:var(--green)">${fmt(p.receita)}</td>
        <td>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="profit-bar-wrap" style="flex:1;min-width:50px"><div class="profit-bar" style="width:${rec>0?((p.receita/rec)*100).toFixed(0):0}%"></div></div>
            <span style="font-size:.72rem;min-width:30px">${rec>0?((p.receita/rec)*100).toFixed(1):0}%</span>
          </div>
        </td>
      </tr>`).join('')}</tbody>
    </table></div>
  </div>
  <div class="card">
    <div class="card-title"><i class="ti ti-credit-card"></i> Por forma de pagamento</div>
    ${Object.entries(pgtos).length===0?`<div class="empty"><p>Sem dados</p></div>`:''}
    <div class="metrics-grid">
      ${Object.entries(pgtos).map(([k,v])=>`<div class="metric"><div class="metric-label">${k}</div><div class="metric-value">${fmt(v)}</div></div>`).join('')}
    </div>
  </div>`;
}

  return `
  <div class="section-title">Configurações <span class="section-title-line"></span></div>
  <div class="card">
    <div class="card-title"><i class="ti ti-palette"></i> Tema de cores</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      ${THEMES.map(th=>`
        <button onclick="applyTheme('${th.id}')" style="
          display:flex;flex-direction:column;align-items:center;gap:7px;
          background:none;border:2px solid ${state.data.tema===th.id?'var(--deep)':'var(--border2)'};
          border-radius:14px;padding:12px 16px;cursor:pointer;font-family:'Montserrat',sans-serif;
          font-size:.72rem;font-weight:600;color:var(--text2);transition:all .15s;
        ">
          <div style="width:36px;height:36px;border-radius:50%;background:${th.dot}"></div>
          ${th.label}
        </button>
      `).join('')}
    </div>
  </div>
  <div class="card">
    <div class="card-title"><i class="ti ti-scissors"></i> Procedimentos (${state.data.procedimentos.length})</div>
    <div class="tag-wrap">
      ${state.data.procedimentos.map(p=>`<div class="proc-tag"><span>${p.nome}</span><span style="font-weight:700">${fmt(p.preco)}</span><button class="x-btn" onclick="delProc('${p.id}')"><i class="ti ti-x"></i></button></div>`).join('')}
    </div>
    <button class="btn btn-primary btn-sm" onclick="openModal('add_proc')"><i class="ti ti-plus"></i> Adicionar procedimento</button>
  </div>
  <div class="card">
    <div class="card-title"><i class="ti ti-package"></i> Produtos / Materiais (${state.data.produtos.length})</div>
    <div class="tag-wrap">
      ${state.data.produtos.map(p=>`<div class="prod-tag"><span>${p.nome}</span><button class="x-btn" onclick="delProd('${p.id}')"><i class="ti ti-x"></i></button></div>`).join('')}
    </div>
    <button class="btn btn-primary btn-sm" onclick="openModal('add_prod')"><i class="ti ti-plus"></i> Adicionar produto</button>

/* ── MODAL ── */
function openModal(m){
  state.modal=m;
  const el=document.getElementById('modal-area');
  el.innerHTML=renderModal();
  attachFormEvents();
}
function closeModal(){
  state.modal=null;
  document.getElementById('modal-area').innerHTML='';
}
function renderModal(){
  const m=state.modal;
  let c='';
  if(m==='novo_atendimento'){c=`
    <div class="modal-title">Novo atendimento <button class="close-btn" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
    <div class="form-group"><label>Data</label><input type="date" id="at_data" value="${today()}"></div>
    <div class="form-group"><label>Nome da cliente</label><input type="text" id="at_cliente" placeholder="Ex: Maria Silva"></div>
    <div class="form-group"><label>Procedimento</label><select id="at_proc"><option value="">Selecione...</option>${state.data.procedimentos.map(p=>`<option value="${p.id}" data-preco="${p.preco}">${p.nome} — ${fmt(p.preco)}</option>`).join('')}</select></div>
    <div class="form-group"><label>Valor cobrado (R$)</label><input type="number" id="at_valor" placeholder="0,00" step="0.01"></div>
    <div class="form-group"><label>Forma de pagamento</label><select id="at_pag"><option>Pix</option><option>Dinheiro</option><option>Cartão</option><option>Crédito</option></select></div>
    <div class="form-group"><label>Materiais usados (opcional)</label><textarea id="at_mat" rows="2" placeholder="Ex: 1 ampola gel, 2ml primer..."></textarea></div>
    <button class="btn btn-primary" style="width:100%;margin-top:4px" onclick="saveAt()"><i class="ti ti-check"></i> Salvar atendimento</button>`;}
  if(m==='novo_gasto'){c=`
    <div class="modal-title">Registrar gasto <button class="close-btn" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
    <div class="form-group"><label>Data</label><input type="date" id="g_data" value="${today()}"></div>
    <div class="form-group"><label>Produto</label><select id="g_prod" onchange="toggleLivre()"><option value="">Selecione...</option>${state.data.produtos.map(p=>`<option value="${p.id}">${p.nome}</option>`).join('')}<option value="_livre">Outro...</option></select></div>
    <div class="form-group" id="g_livre_wrap" style="display:none"><label>Nome do produto</label><input type="text" id="g_prod_livre" placeholder="Digite o produto"></div>
    <div class="form-group"><label>Descrição / quantidade</label><input type="text" id="g_desc" placeholder="Ex: 1 kit gel UV 250ml"></div>
    <div class="form-group"><label>Valor (R$)</label><input type="number" id="g_valor" placeholder="0,00" step="0.01"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:4px" onclick="saveGasto()"><i class="ti ti-check"></i> Salvar</button>`;}
  if(m==='add_proc'){c=`
    <div class="modal-title">Novo procedimento <button class="close-btn" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
    <div class="form-group"><label>Nome</label><input type="text" id="proc_nome" placeholder="Ex: Design de sobrancelha"></div>
    <div class="form-group"><label>Preço padrão (R$)</label><input type="number" id="proc_preco" placeholder="0,00" step="0.01"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:4px" onclick="saveProc()"><i class="ti ti-check"></i> Salvar</button>`;}
  if(m==='add_prod'){c=`
    <div class="modal-title">Novo produto <button class="close-btn" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
    <div class="form-group"><label>Nome do produto</label><input type="text" id="prod_nome" placeholder="Ex: Primer desidratador"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:4px" onclick="saveProd()"><i class="ti ti-check"></i> Salvar</button>`;}
  return `<div class="modal-bg" onclick="handleOverlay(event)"><div class="modal">${c}</div></div>`;
}

function attachFormEvents(){
  const ap=document.getElementById('at_proc');
  if(ap)ap.addEventListener('change',function(){
    const o=this.options[this.selectedIndex];
    const pr=o.getAttribute('data-preco');
    const v=document.getElementById('at_valor');
    if(v&&pr)v.value=pr;
  });
}

/* ── ACTIONS ── */
window.nav=nav;
window.setTab=(s,t)=>{state.tabs[s]=t;renderScreen(s)};
window.openModal=openModal;
window.closeModal=closeModal;
window.applyTheme=applyTheme;
window.handleOverlay=e=>{if(e.target.classList.contains('modal-bg'))closeModal()};
window.toggleLivre=()=>{
  const s=document.getElementById('g_prod');
  const w=document.getElementById('g_livre_wrap');
  if(w)w.style.display=s&&s.value==='_livre'?'flex':'none';
};
window.saveAt=()=>{
  const data=document.getElementById('at_data')?.value;
  const cliente=document.getElementById('at_cliente')?.value.trim();
  const proc=document.getElementById('at_proc')?.value;
  const valor=document.getElementById('at_valor')?.value;
  const pag=document.getElementById('at_pag')?.value;
  const mat=document.getElementById('at_mat')?.value.trim();
  if(!data||!proc||!valor)return showAlert('Preencha data, procedimento e valor','error');
  state.data.atendimentos.push({id:uid(),data,cliente,procedimento_id:proc,valor_cobrado:parseFloat(valor),pagamento:pag,materiais:mat});
  saveState();closeModal();showAlert('Atendimento salvo! 🌷');
  renderScreen(state.page);
};
window.saveGasto=()=>{
  const data=document.getElementById('g_data')?.value;
  const prod=document.getElementById('g_prod')?.value;
  const livre=document.getElementById('g_prod_livre')?.value.trim();
  const desc=document.getElementById('g_desc')?.value.trim();
  const valor=document.getElementById('g_valor')?.value;
  if(!data||!valor)return showAlert('Preencha data e valor','error');
  state.data.gastos_materiais.push({id:uid(),data,produto_id:prod!=='_livre'?prod:null,produto_livre:prod==='_livre'?livre:null,descricao:desc,valor:parseFloat(valor)});
  saveState();closeModal();showAlert('Gasto registrado!');
  renderScreen(state.page);
};
window.saveProc=()=>{
  const nome=document.getElementById('proc_nome')?.value.trim();
  const preco=document.getElementById('proc_preco')?.value;
  if(!nome)return showAlert('Informe o nome','error');
  state.data.procedimentos.push({id:uid(),nome,preco:parseFloat(preco)||0});
  saveState();closeModal();showAlert('Procedimento adicionado!');
  renderScreen(state.page);
};
window.saveProd=()=>{
  const nome=document.getElementById('prod_nome')?.value.trim();
  if(!nome)return showAlert('Informe o nome','error');
  state.data.produtos.push({id:uid(),nome});
  saveState();closeModal();showAlert('Produto adicionado!');
  renderScreen(state.page);
};
window.fecharCaixa=()=>{
  const obs=document.getElementById('obs_caixa')?.value.trim();
  const h=today();
  const ah=state.data.atendimentos.filter(a=>a.data===h);
  const gh=state.data.gastos_materiais.filter(g=>g.data===h);
  const ent=ah.reduce((s,a)=>s+(parseFloat(a.valor_cobrado)||0),0);
  const sai=gh.reduce((s,g)=>s+(parseFloat(g.valor)||0),0);
  state.data.caixa_fechamentos=state.data.caixa_fechamentos.filter(f=>f.data!==h);
  state.data.caixa_fechamentos.push({id:uid(),data:h,entradas:ent,saidas:sai,saldo:ent-sai,obs});
  saveState();showAlert('Caixa fechado! ✅');
};
window.delAt=id=>{if(!confirm('Excluir atendimento?'))return;state.data.atendimentos=state.data.atendimentos.filter(a=>a.id!==id);saveState();renderScreen(state.page)};
window.delGasto=id=>{if(!confirm('Excluir gasto?'))return;state.data.gastos_materiais=state.data.gastos_materiais.filter(g=>g.id!==id);saveState();renderScreen(state.page)};
window.delProc=id=>{if(!confirm('Excluir procedimento?'))return;state.data.procedimentos=state.data.procedimentos.filter(p=>p.id!==id);saveState();renderScreen(state.page)};
window.delProd=id=>{if(!confirm('Excluir produto?'))return;state.data.produtos=state.data.produtos.filter(p=>p.id!==id);saveState();renderScreen(state.page)};

/* ── INIT ── */
function init(){
  const tema=state.data.tema||'rosa';
  document.body.setAttribute('data-theme',tema);
  renderSidebar();
  renderThemeDots();
  renderScreen('dashboard');
}
init();
</script>
</body>
</html>
